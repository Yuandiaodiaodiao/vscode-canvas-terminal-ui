name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-vscode:
    name: Build VSCode Extension
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminal-canvas-vsix
          path: '*.vsix'

  build-jetbrains:
    name: Build JetBrains Plugin
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        working-directory: jetbrains-terminal-canvas
        run: ./gradlew buildPlugin

      - name: Upload JetBrains plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminal-canvas-jetbrains
          path: 'jetbrains-terminal-canvas/build/distributions/*.zip'
